[pytest]
addopts = 
    --basetemp=.pytest_tmp 
    --dist=loadgroup 
    -n 0
    # default to zero threads to prevent issues with the Unreal Unit Tests
    #--cov=./Resources/python/schola 
    #--cov-report=html
    #--cov-report=json
    #--pytest-durations=10
    #--pytest-durations-min=1
    #--pytest-durations-log=durations_log.txt
    # --cov-config=Resources/python/pyproject.toml
norecursedirs = 
    ThirdParty 
    Docs 
    Generated 
    *.egg 
    .* 
    _darcs 
    build 
    CVS 
    dist 
    node_modules 
    venv 
    {arch}
    __pycache__
testpaths = 
    Test 
    Source
engine_path = C:/Program Files/Epic Games/UE_5.7
build_unreal = True
schola_cpp_coverage_html = False
schola_cpp_coverage_cobertura = False
log_file = pytest.log
log_file_level = INFO